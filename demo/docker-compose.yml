services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    shm_size: "2gb"
    volumes:
      - vectorseam-demo-postgres:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - maintenance_work_mem=1GB
      - -c
      - shared_buffers=256MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  vectorseam-demo-postgres:
